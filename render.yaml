services:
  # ── Backend Web Service ──────────────────────────────────────────
  - type: web
    name: employee-analytics-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false   # Set this to https://<your-frontend>.onrender.com

  # ── Frontend Static Site ─────────────────────────────────────────
  - type: web
    name: employee-analytics-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        sync: false   # Set this to https://<your-backend>.onrender.com/api
